category: coding
tasks:
  # --- EASY (baseline calibration) ---
  - id: coding_001
    name: "FizzBuzz"
    prompt: |
      Write a Python function called fizzbuzz(n) that returns a list of strings for numbers 1 to n.
      For multiples of 3, use "Fizz". For multiples of 5, use "Buzz".
      For multiples of both 3 and 5, use "FizzBuzz". Otherwise, use the string representation of the number.

      Then call it with n=15 and print each element on its own line.
    scorer:
      type: code_execution
      expected: ["1\n2\nFizz\n4\nBuzz\nFizz\n7\n8\nFizz\nBuzz\n11\nFizz\n13\n14\nFizzBuzz"]
    metadata: { difficulty: easy }

  - id: coding_002
    name: "Binary search"
    prompt: |
      Write a Python function binary_search(arr, target) that returns the index of target
      in a sorted list arr, or -1 if not found. Do not use any built-in search functions.

      Test it with: print(binary_search([1, 3, 5, 7, 9, 11, 13], 7))
    scorer:
      type: code_execution
      expected: ["3"]
    metadata: { difficulty: easy }

  # --- MEDIUM ---
  - id: coding_003
    name: "Valid parentheses with nesting"
    prompt: |
      Write a Python function is_valid(s) that checks if a string of brackets
      (){}[] is valid (properly opened and closed in order).

      Test these cases and print True/False for each on its own line:
      - "()"
      - "()[]{}"
      - "(]"
      - "([)]"
      - "{[]}"
      - "(({{[[]]}}))"
      - ""
    scorer:
      type: code_execution
      expected: ["True\nTrue\nFalse\nFalse\nTrue\nTrue\nTrue"]
    metadata: { difficulty: medium }

  - id: coding_004
    name: "Caesar cipher"
    prompt: |
      Write a Python function caesar_encrypt(text, shift) that encrypts text
      using a Caesar cipher. Only shift letters (a-z, A-Z), leave other characters unchanged.

      Test: print(caesar_encrypt("Hello, World!", 3))
    scorer:
      type: code_execution
      expected: ["Khoor, Zruog!"]
    metadata: { difficulty: medium }

  - id: coding_005
    name: "Merge k sorted lists"
    prompt: |
      Write a Python function merge_k_sorted(lists) that takes a list of sorted lists
      and merges them into one sorted list. Do not use sort() or sorted() on the final
      result — use a heap or merge approach.

      Test: print(merge_k_sorted([[1, 4, 7], [2, 5, 8], [3, 6, 9]]))
    scorer:
      type: code_execution
      expected: ["[1, 2, 3, 4, 5, 6, 7, 8, 9]"]
    metadata: { difficulty: medium }

  # --- HARD ---
  - id: coding_006
    name: "LRU cache implementation"
    prompt: |
      Implement a Python class LRUCache with capacity, get(key), and put(key, value) methods.
      get returns -1 if key not found. put evicts the least recently used item when at capacity.
      Both get and put must be O(1) average time.

      Test:
      cache = LRUCache(2)
      cache.put(1, 1)
      cache.put(2, 2)
      print(cache.get(1))       # 1
      cache.put(3, 3)           # evicts key 2
      print(cache.get(2))       # -1
      cache.put(4, 4)           # evicts key 1
      print(cache.get(1))       # -1
      print(cache.get(3))       # 3
      print(cache.get(4))       # 4
    scorer:
      type: code_execution
      expected: ["1\n-1\n-1\n3\n4"]
    metadata: { difficulty: hard }

  - id: coding_007
    name: "Longest increasing subsequence"
    prompt: |
      Write a Python function lis_length(nums) that returns the length of the
      longest strictly increasing subsequence. Use an O(n log n) algorithm.

      Test:
      print(lis_length([10, 9, 2, 5, 3, 7, 101, 18]))
      print(lis_length([0, 1, 0, 3, 2, 3]))
      print(lis_length([7, 7, 7, 7, 7]))
    scorer:
      type: code_execution
      expected: ["4\n4\n1"]
    metadata: { difficulty: hard }

  - id: coding_008
    name: "Serialize and deserialize binary tree"
    prompt: |
      Implement a binary tree node class and two functions:
      - serialize(root) -> str: converts a binary tree to a string
      - deserialize(data) -> node: reconstructs the tree from the string

      The serialization format is up to you, but deserialize(serialize(tree))
      must produce an identical tree.

      Test:
      # Build tree:    1
      #              /   \
      #             2     3
      #                  / \
      #                 4   5
      root = TreeNode(1, TreeNode(2), TreeNode(3, TreeNode(4), TreeNode(5)))
      s = serialize(root)
      root2 = deserialize(s)

      # Verify with inorder traversal
      def inorder(node):
          if not node: return []
          return inorder(node.left) + [node.val] + inorder(node.right)

      print(inorder(root2))
    scorer:
      type: code_execution
      expected: ["[2, 1, 4, 3, 5]"]
    metadata: { difficulty: hard }

  - id: coding_009
    name: "Topological sort with cycle detection"
    prompt: |
      Write a Python function topo_sort(num_nodes, edges) where edges is a list
      of (from, to) pairs. Return a valid topological ordering as a list,
      or an empty list if a cycle exists.

      Test:
      print(topo_sort(4, [(0,1), (0,2), (1,3), (2,3)]))  # valid ordering
      print(topo_sort(3, [(0,1), (1,2), (2,0)]))          # cycle -> []

      For the first test, the output must end with 3 (since both 1 and 2 must come before 3).
    scorer:
      type: code_execution
      expected: ["3]\n[]"]
    metadata: { difficulty: hard }

  - id: coding_010
    name: "Regex engine (basic)"
    prompt: |
      Write a Python function regex_match(text, pattern) that supports:
      - '.' matches any single character
      - '*' matches zero or more of the preceding element

      Do NOT use the re module. Implement from scratch.

      Test:
      print(regex_match("aa", "a"))         # False
      print(regex_match("aa", "a*"))        # True
      print(regex_match("ab", ".*"))        # True
      print(regex_match("aab", "c*a*b"))    # True
      print(regex_match("mississippi", "mis*is*ip*."))  # True
    scorer:
      type: code_execution
      expected: ["False\nTrue\nTrue\nTrue\nTrue"]
    metadata: { difficulty: hard }

  - id: coding_011
    name: "Interval scheduling maximization"
    prompt: |
      Write a Python function max_non_overlapping(intervals) that takes a list of
      [start, end] intervals and returns the maximum number of non-overlapping
      intervals you can select.

      Test:
      print(max_non_overlapping([[1,3], [2,4], [3,5], [0,6], [5,7], [8,9], [5,9]]))
      print(max_non_overlapping([[1,2], [2,3], [3,4], [1,3]]))
    scorer:
      type: code_execution
      expected: ["4\n3"]
    metadata: { difficulty: medium }

  - id: coding_012
    name: "Implement trie with prefix count"
    prompt: |
      Implement a Trie class with methods:
      - insert(word): insert a word
      - count_prefix(prefix): return how many inserted words start with this prefix

      Test:
      t = Trie()
      for w in ["apple", "app", "application", "banana", "band", "ban"]:
          t.insert(w)
      print(t.count_prefix("app"))    # 3
      print(t.count_prefix("ban"))    # 3
      print(t.count_prefix("band"))   # 1
      print(t.count_prefix("cat"))    # 0
    scorer:
      type: code_execution
      expected: ["3\n3\n1\n0"]
    metadata: { difficulty: medium }
